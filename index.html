<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Sign-in widget: only the site owner can authenticate here to enable saving -->
<div class="auth-widget" id="authWidget">
  <button class="today-btn" id="authBtn" type="button">Sign in</button>
  <div class="auth-panel" id="authPanel">
    <label for="authEmail">Email</label>
    <input type="email" id="authEmail" autocomplete="username">
    <label for="authPassword">Password</label>
    <input type="password" id="authPassword" autocomplete="current-password">
    <button type="button" class="add-btn" id="authSubmitBtn">Sign in</button>
    <p class="auth-error" id="authError"></p>
  </div>
</div>

<div class="stage">
  <div class="ledger-head">
    <svg class="sigil" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="30" stroke="#a9832f" stroke-width="1.2"/>
      <path d="M50 20 L50 80 M20 50 L80 50" stroke="#8c1c2b" stroke-width="1.2"/>
      <circle cx="50" cy="50" r="4" fill="#a9832f"/>
      <path d="M50 12 L54 20 L46 20 Z" fill="#a9832f"/>
    </svg>

    <svg class="floral-banner" viewBox="0 0 640 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- central rosette -->
      <g stroke="#a9832f" stroke-width="1.1">
        <circle cx="320" cy="65" r="7" fill="#8c1c2b" stroke="none" opacity="0.8"/>
        <path d="M320 58 C326 46 334 44 340 48 C336 56 328 60 320 58Z"/>
        <path d="M320 58 C314 46 306 44 300 48 C304 56 312 60 320 58Z"/>
        <path d="M320 72 C326 84 334 86 340 82 C336 74 328 70 320 72Z"/>
        <path d="M320 72 C314 84 306 86 300 82 C304 74 312 70 320 72Z"/>
      </g>
      <!-- vines running outward, mirrored -->
      <g stroke="#a9832f" stroke-width="1" opacity="0.85">
        <path d="M300 65 C240 60 210 75 160 65 C120 57 90 68 55 60"/>
        <path d="M340 65 C400 60 430 75 480 65 C520 57 550 68 585 60"/>
      </g>
      <g stroke="#8c1c2b" stroke-width="1" opacity="0.75">
        <path d="M300 65 C240 70 210 55 160 65 C120 73 90 62 55 70"/>
        <path d="M340 65 C400 70 430 55 480 65 C520 73 550 62 585 70"/>
      </g>
      <!-- leaves + berries along the left vine -->
      <g fill="#a9832f" opacity="0.85">
        <ellipse cx="230" cy="55" rx="10" ry="4" transform="rotate(-18 230 55)"/>
        <ellipse cx="180" cy="72" rx="10" ry="4" transform="rotate(14 180 72)"/>
        <ellipse cx="130" cy="58" rx="9" ry="3.6" transform="rotate(-12 130 58)"/>
        <circle cx="205" cy="63" r="3"/>
        <circle cx="155" cy="66" r="3"/>
        <circle cx="90" cy="64" r="3"/>
      </g>
      <!-- leaves + berries along the right vine, mirrored -->
      <g fill="#a9832f" opacity="0.85">
        <ellipse cx="410" cy="55" rx="10" ry="4" transform="rotate(18 410 55)"/>
        <ellipse cx="460" cy="72" rx="10" ry="4" transform="rotate(-14 460 72)"/>
        <ellipse cx="510" cy="58" rx="9" ry="3.6" transform="rotate(12 510 58)"/>
        <circle cx="435" cy="63" r="3"/>
        <circle cx="485" cy="66" r="3"/>
        <circle cx="550" cy="64" r="3"/>
      </g>
      <!-- small end blossoms -->
      <g stroke="#8c1c2b" stroke-width="1" fill="none" opacity="0.8">
        <circle cx="55" cy="60" r="6"/>
        <circle cx="585" cy="60" r="6"/>
      </g>
      <g fill="#8c1c2b" opacity="0.8">
        <circle cx="55" cy="60" r="2"/>
        <circle cx="585" cy="60" r="2"/>
      </g>
      <!-- fine frame ticks -->
      <g stroke="#6e5a25" stroke-width="0.6" opacity="0.5">
        <path d="M20 100 H620"/>
        <path d="M20 95 V105 M620 95 V105"/>
      </g>
    </svg>
  </div>

  <div class="page">
    <div class="month-bar">
      <div class="nav-group">
        <button class="nav-btn" id="prevBtn" aria-label="Back to the previous page">&#9650;</button>
        <button class="nav-btn" id="nextBtn" aria-label="Forward to the next page">&#9660;</button>
      </div>
      <div class="month-id">
        <button class="page-label" id="pageLabel" type="button">Page —</button>
        <h2 id="monthLabel"></h2>
        <div class="page-jump" id="pageJump">
          <label for="pageInput">Jump to a page</label>
          <div class="page-jump-row">
            <input type="number" id="pageInput" step="1">
            <button type="button" class="page-jump-go" id="pageGoBtn">Go</button>
          </div>
          <p class="page-hint">Page 1 is January 2026.</p>
        </div>
      </div>
      <button class="today-btn" id="todayBtn">Return to today</button>
    </div>

    <div class="weekdays">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div class="grid-wrap" id="gridWrap">
      <div class="grid" id="grid"></div>
    </div>

  </div>
</div>

<!-- Shared backdrop: blocks the calendar behind while either panel is open, and closing it dismisses both -->
<div class="day-view-backdrop" id="dayViewBackdrop"></div>

<!-- Timeline panel: flips in from the left edge, showing the day's events by time -->
<div class="timeline-overlay" id="timelineOverlay">
  <div class="timeline-panel" id="timelinePanel" role="dialog" aria-label="Day timeline">
    <div class="timeline-head">
      <div>
        <div class="weekday-label" id="timelineWeekday"></div>
        <h3 id="timelineDate"></h3>
      </div>
      <button class="icon-btn" id="closeTimelineBtn" aria-label="Close">&#10005;</button>
    </div>
    <div class="timeline-track-wrap" id="timelineTrackWrap">
      <div class="timeline-track" id="timelineTrack"></div>
    </div>
    <div class="timeline-untimed" id="timelineUntimed"></div>
  </div>
</div>

<!-- Menu appears in the upper-right area of the screen to display events -->
<div class="drawer-overlay" id="drawerOverlay">
  <div class="ledger-drawer" id="ledgerDrawer" role="dialog" aria-label="Day's events">
    <div class="book-head">
      <div>
        <div class="weekday-label" id="panelWeekday"></div>
        <h3 id="panelDate"></h3>
        <div class="chapter-tag" id="chapterTag"></div>
      </div>
      <button class="icon-btn" id="closeDrawerBtn" aria-label="Close">&#10005;</button>
    </div>

    <div class="entries-list" id="entriesList"></div>

    <button type="button" class="add-btn" id="openAddBtn">New event</button>
  </div>
</div>

<!-- Open separately to write a new event -->
<div class="overlay" id="bookOverlay">
  <div class="book" id="book">
    <div class="book-head">
      <div>
        <div class="weekday-label">New event</div>
        <h3 id="bookDateLabel"></h3>
      </div>
      <button class="icon-btn" id="closeBookBtn" aria-label="Close">&#10005;</button>
    </div>

    <form class="add-entry" id="addForm">
      <div class="row">
        <input type="text" id="titleInput" placeholder="Enter Title" maxlength="60" required>
      </div>
      <div class="row time-row">
        <div class="time-field">
          <label for="startTimeInput">Start</label>
          <input type="time" id="startTimeInput">
        </div>
        <div class="time-field">
          <label for="endTimeInput">End</label>
          <input type="time" id="endTimeInput">
        </div>
      </div>
      <div class="row">
        <textarea id="noteInput" placeholder="Notes (optional)" maxlength="200"></textarea>
      </div>
      <button type="submit" class="add-btn">Schedule</button>
    </form>
  </div>
</div>

<script type="module" src="firebase.js"></script>

<script type="module" src="app.js"></script>
<script src="protect.js"></script>
</body>
</html>
